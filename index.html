<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FinanceHub India - Smart Finance Calculators</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:30px;
background:#020617;
font-size:28px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
margin-bottom:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#3b82f6;
border:none;
border-radius:5px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>
FinanceHub India
</header>

<div class="container">

<div class="card">

<h2>EMI Calculator</h2>

<input id="loan" placeholder="Loan Amount">

<input id="rate" placeholder="Interest Rate %">

<input id="time" placeholder="Loan Tenure (Years)">

<button onclick="emi()">Calculate EMI</button>

<div class="result" id="emiResult"></div>

</div>


<div class="card">

<h2>SIP Calculator</h2>

<input id="sip" placeholder="Monthly Investment">

<input id="return" placeholder="Expected Return %">

<input id="years" placeholder="Years">

<button onclick="sip()">Calculate SIP</button>

<div class="result" id="sipResult"></div>

</div>

</div>


<footer>
© 2026 FinanceHub India | Smart Financial Tools
</footer>


<script>

function emi(){

let p = document.getElementById("loan").value;
let r = document.getElementById("rate").value / 12 / 100;
let n = document.getElementById("time").value * 12;

let emi = p * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);

document.getElementById("emiResult").innerHTML =
"Monthly EMI : ₹ " + emi.toFixed(2);

}

function sip(){

let m = document.getElementById("sip").value;
let r = document.getElementById("return").value/100/12;
let n = document.getElementById("years").value*12;

let fv = m*((Math.pow(1+r,n)-1)/r)*(1+r);

document.getElementById("sipResult").innerHTML =
"Future Value : ₹ " + fv.toFixed(0);

}

</script>

</body>
</html>
