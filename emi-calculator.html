<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator India</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
text-align:center;
}

input{
padding:10px;
margin:8px 0;
width:100%;
border-radius:6px;
border:none;
font-size:14px;
}

button{
padding:10px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:15px;
text-align:left;
font-size:14px;
}

.result div{
margin:8px 0;
padding:10px;
background:#0f172a;
border-radius:6px;
}

a{
color:#38bdf8;
text-decoration:none;
display:block;
margin-top:15px;
font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<h3>EMI Calculator</h3>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="months" placeholder="Tenure (Months)">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="result" id="result"></div>

<a href="index.html">← Back to Home</a>

</div>

<script>
function calculateEMI(){

let P=parseFloat(document.getElementById("loan").value);
let annualRate=parseFloat(document.getElementById("rate").value);
let months=parseFloat(document.getElementById("months").value);

let R=annualRate/12/100;
let N=months;

let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);

let totalPayment=EMI*N;
let totalInterest=totalPayment-P;

document.getElementById("result").innerHTML=
"<div><strong>Monthly EMI:</strong> ₹ "+EMI.toFixed(2)+"</div>"+
"<div><strong>Total Interest:</strong> ₹ "+totalInterest.toFixed(2)+"</div>"+
"<div><strong>Total Amount:</strong> ₹ "+totalPayment.toFixed(2)+"</div>";

}
</script>

</body>
</html>
