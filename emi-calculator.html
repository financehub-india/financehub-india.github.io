<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator India | FinanceHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family: 'Segoe UI', Arial, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#ffffff;
padding:35px;
border-radius:14px;
width:380px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
text-align:center;
}

h2{
margin-bottom:25px;
color:#111827;
font-weight:600;
}

input{
padding:12px;
margin:8px 0;
width:100%;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

button{
padding:12px;
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
margin-top:12px;
transition:0.3s;
font-weight:500;
}

button:hover{
background:#1e40af;
}

.result{
margin-top:22px;
text-align:left;
}

.result div{
margin:10px 0;
padding:14px;
background:#f9fafb;
border-radius:8px;
display:flex;
justify-content:space-between;
font-size:14px;
border:1px solid #e5e7eb;
}

.label{
color:#374151;
}

.value{
font-weight:600;
color:#111827;
}

a{
color:#2563eb;
text-decoration:none;
display:block;
margin-top:18px;
font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<h2>EMI Calculator</h2>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="months" placeholder="Tenure (Months)">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="result" id="result"></div>

<a href="index.html">← Back to Home</a>

</div>

<script>

function formatIndianNumber(num){
return new Intl.NumberFormat('en-IN',{
minimumFractionDigits:2,
maximumFractionDigits:2
}).format(num);
}

function calculateEMI(){

let P=parseFloat(document.getElementById("loan").value);
let annualRate=parseFloat(document.getElementById("rate").value);
let months=parseFloat(document.getElementById("months").value);

if(!P || !annualRate || !months){
alert("Please fill all fields properly");
return;
}

let R=annualRate/12/100;
let N=months;

let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);

let totalPayment=EMI*N;
let totalInterest=totalPayment-P;

document.getElementById("result").innerHTML=

"<div><span class='label'>Monthly EMI</span><span class='value'>₹ "+formatIndianNumber(EMI)+"</span></div>"+

"<div><span class='label'>Total Interest</span><span class='value'>₹ "+formatIndianNumber(totalInterest)+"</span></div>"+

"<div><span class='label'>Total Amount</span><span class='value'>₹ "+formatIndianNumber(totalPayment)+"</span></div>";

}

</script>

</body>
</html>
